services:
  backend:
    build: ./backend
    volumes:
      - backend-data:/app/data
    environment:
      - WHISPER_MODEL=base
      - PIPER_MODEL_DIR=/models/piper
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
